<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Alphatek Reports</title>
    <link rel="stylesheet" type="text/css"
        href="https://fonts.googleapis.com/css2?family=Avenir:wght@400&family=Futura:wght@400&display=swap">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="top-nav">
        <div class="top-nav-logo">
            <img src="https://storage.googleapis.com/intro_alphatek/logo.png" alt="Alphatek Logo">
        </div>
    </div>
    
    <div class="hero-section">
        <h1>Welcome</h1>
        <p>Ready to inspire your clients today? Let's get started.</p>
    </div>

    <div class="login-wrapper">
        <div class="login-container">
            <form id="auth-form">
                
                <div id="register-fields" style="display: none; opacity: 0;">
                    <div class="form-group">
                        <label for="name">Name / Organization</label>
                        <input type="text" id="name" placeholder="e.g. Your Clinic or Name" class="glass-input">
                    </div>
                    <div class="form-group">
                        <label for="role">Role</label>
                        <select id="role" class="glass-input" onchange="if(this.value==='Other') { document.getElementById('role-custom').style.display = 'block'; document.getElementById('role-custom').focus(); } else { document.getElementById('role-custom').style.display = 'none'; }">
                            <option value="Trainer" selected>Trainer</option>
                            <option value="Therapist">Therapist</option>
                            <option value="Other">Other / Enter manually</option>
                        </select>
                        <input type="text" id="role-custom" placeholder="Enter custom role..." class="glass-input" style="display:none; margin-top: 10px;">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="name@example.com" class="glass-input">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="********" class="glass-input">
                </div>
                
                <div id="auth-message"></div>

                <button type="submit" class="btn-primary" id="submit-btn">
                    <span id="submit-text">Login</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>
            
            <div class="toggle-auth">
                <span id="toggle-text">Don't have an account?</span>
                <a id="toggle-btn">Sign Up</a>
            </div>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>

</html>
